<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sparkle 공룡 AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    /* 로딩 화면 */
    #loading {
      position: fixed; inset: 0;
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff; font-family: sans-serif;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-emoji { font-size: 72px; animation: bounce 1s infinite; }
    .loading-title { font-size: 24px; font-weight: bold; margin: 16px 0 8px; }
    .loading-sub { font-size: 14px; opacity: 0.7; }
    .loading-bar {
      width: 200px; height: 6px; background: #333;
      border-radius: 3px; margin-top: 24px; overflow: hidden;
    }
    .loading-fill {
      height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A);
      border-radius: 3px; animation: loadFill 3s ease-in-out forwards;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-16px); }
    }
    @keyframes loadFill {
      from { width: 0; }
      to   { width: 100%; }
    }

    /* 안내 UI */
    #guide {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: rgba(0,0,0,0.55);
      color: #fff; font-family: sans-serif;
      display: flex; align-items: center; gap: 12px;
      z-index: 100;
    }
    #guide-emoji { font-size: 28px; }
    #guide-text  { font-size: 14px; line-height: 1.4; }
    #guide-name  { font-size: 18px; font-weight: bold; }

    /* 감지 성공 배지 */
    #detected-badge {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(76,175,80,0.9);
      color: #fff; font-family: sans-serif;
      padding: 10px 24px; border-radius: 99px;
      font-size: 15px; font-weight: bold;
      display: none; z-index: 100;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* 뒤로가기 버튼 */
    #btn-back {
      position: fixed; top: 12px; right: 16px;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%; border: none; cursor: pointer;
      color: #fff; font-size: 18px; z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }

    /* A-Frame 캔버스 전체화면 */
    a-scene { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loading">
  <div class="loading-emoji" id="loading-emoji">🦕</div>
  <div class="loading-title" id="loading-title">공룡을 찾는 중...</div>
  <div class="loading-sub">카메라를 공룡 카드에 비춰주세요</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- 안내 바 -->
<div id="guide">
  <div id="guide-emoji">🦖</div>
  <div>
    <div id="guide-name">공룡 카드를 찾는 중</div>
    <div id="guide-text">카드를 카메라에 비춰주세요</div>
  </div>
</div>

<!-- 감지 성공 배지 -->
<div id="detected-badge">✅ 공룡 발견!</div>

<!-- 뒤로가기 -->
<button id="btn-back" onclick="history.back()">✕</button>

<!-- ═══════════════════════════════════════
     A-Frame + AR.js 씬
     CDN에서 라이브러리 로드 (인터넷 필요 시 로컬 번들 교체 가능)
     로컬 번들: assets/ar_dino/lib/aframe.min.js
                assets/ar_dino/lib/aframe-ar-nft.min.js
═══════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<a-scene id="ar-scene"
  embedded
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
  arjs="sourceType: webcam;
        trackingMethod: best;
        detectionMode: mono_and_matrix;
        matrixCodeType: 3x3;
        debugUIEnabled: false;">

  <!-- 에셋 선언 (디노 ID에 따라 JS가 동적으로 주입) -->
  <a-assets id="scene-assets" timeout="30000">
  </a-assets>

  <!-- NFT 이미지 타겟 (JS에서 동적으로 url 설정) -->
  <a-nft id="nft-target"
    type="nft"
    url=""
    smooth="true"
    smoothCount="10"
    smoothTolerance="0.01"
    smoothThreshold="5">

    <!-- 3D 공룡 모델 (JS에서 동적으로 설정) -->
    <a-entity id="dino-model"
      position="0 0 0"
      rotation="-90 0 0"
      scale="1 1 1">
    </a-entity>

    <!-- 그림자 원 (땅에 붙은 느낌) -->
    <a-circle
      id="dino-shadow"
      radius="0.6"
      rotation="-90 0 0"
      position="0 0 0.01"
      material="color: #000; opacity: 0.3; transparent: true">
    </a-circle>

    <!-- 발광 링 (공룡 주위 빛) -->
    <a-ring
      id="glow-ring"
      inner-radius="0.55"
      outer-radius="0.70"
      rotation="-90 0 0"
      position="0 0 0.02"
      animation="property: rotation;
                 to: -90 360 0;
                 loop: true;
                 dur: 4000;
                 easing: linear;">
    </a-ring>

  </a-nft>

  <!-- ── 대체 표시: 이미지 트래킹 대신 마커 기반 ──
       res/raw 에 이미지를 넣지 않은 경우 hiro 마커로 테스트 가능
       <a-marker preset="hiro">
         <a-entity id="dino-model-marker" ...></a-entity>
       </a-marker>
  -->

  <a-entity camera></a-entity>
</a-scene>

<script>

// ════════════════════════════════════════════════════
//  ★ 배포 설정 — GitHub 계정명·저장소명만 수정하세요
// ════════════════════════════════════════════════════
const GITHUB_USER  = 'hyperctim';          // GitHub 계정명
const GITHUB_REPO  = 'sparkle-dino';       // ← 저장소명

// GitHub Pages: viewer.html, NFT 마커
const PAGES_BASE   = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}`;

// jsDelivr CDN: GLB 모델 (GitHub 저장소 자동 연동, 전 세계 CDN)
const JSDELIVR_BASE = `https://cdn.jsdelivr.net/gh/${GITHUB_USER}/${GITHUB_REPO}@main`;

// 3D 모델 URL (jsDelivr)
function getBestModelUrl(id) {
  return `${JSDELIVR_BASE}/models/${id}.glb`;
}

// ════════════════════════════════════════════════════
//  URL 파라미터에서 디노 ID 추출
// ════════════════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
const dinoId = (params.get('dino') || 'trex').toLowerCase();
const dino   = DINO_DATA[dinoId] || DINO_DATA['trex'];

// ════════════════════════════════════════════════════
//  UI 초기화
// ════════════════════════════════════════════════════
document.getElementById('loading-emoji').textContent = dino.emoji;
document.getElementById('loading-title').textContent = dino.nameKo + ' 준비 중...';
document.getElementById('guide-emoji').textContent   = dino.emoji;
document.getElementById('guide-name').textContent    = dino.nameKo;
document.getElementById('guide-text').textContent    = '카드를 천천히 카메라 앞에 비춰주세요';

// ════════════════════════════════════════════════════
//  A-Frame 씬 설정 (공룡별 NFT 마커 + 모델 주입)
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const scene      = document.getElementById('ar-scene');
  const nftTarget  = document.getElementById('nft-target');
  const dinoModel  = document.getElementById('dino-model');
  const glowRing   = document.getElementById('glow-ring');

  // ── NFT 마커 URL (GitHub Pages) ────────────────────────────
  nftTarget.setAttribute('url',
    `${PAGES_BASE}/nft_markers/${dinoId}/${dinoId}`
  );

  // ── 3D 모델 URL ────────────────────────────────────────────
  // 방식 A (기본): 앱 내 assets에 GLB 포함 → 오프라인 동작, 앱 용량 증가
  // const modelUrl = `http://127.0.0.1:8765/ar_dino/models/${dinoId}.glb`;

  // 방식 B (권장): 서버에서 스트리밍 → 앱 용량 최소화, 인터넷 필요
  // 예) const modelUrl = `https://your-cdn.com/sparkle-dino/models/${dinoId}.glb`;

  // 방식 C (하이브리드): 첫 실행 시 다운로드 후 캐싱 (아래 loadModel 함수 사용)
  const modelUrl = getBestModelUrl(dinoId);

  dinoModel.setAttribute('gltf-model', modelUrl);
  dinoModel.setAttribute('scale', dino.scale);

  // 모델 등장 애니메이션 (위에서 떨어지는 효과)
  dinoModel.setAttribute('animation__drop',
    'property: position; from: 0 1 0; to: 0 0 0; dur: 800; easing: easeOutBounce; startEvents: model-loaded'
  );
  // 회전 애니메이션
  dinoModel.setAttribute('animation__rotate',
    'property: rotation; to: -90 360 0; loop: true; dur: 10000; easing: linear'
  );

  // 발광 링 색상을 공룡 색으로
  glowRing.setAttribute('material',
    `color: ${dino.color}; opacity: 0.6; transparent: true`
  );

  // ── NFT 트래킹 이벤트 ──
  nftTarget.addEventListener('targetFound', () => {
    console.log('[AR] 타겟 발견: ' + dinoId);

    const badge = document.getElementById('detected-badge');
    badge.textContent = dino.emoji + '  ' + dino.nameKo + ' 발견!';
    badge.style.display = 'block';
    badge.style.background = dino.color + 'ee';

    document.getElementById('guide-text').textContent = dino.fact;
    setTimeout(() => { badge.style.display = 'none'; }, 3000);
  });

  nftTarget.addEventListener('targetLost', () => {
    console.log('[AR] 타겟 소실');
    document.getElementById('guide-text').textContent = '카드를 다시 카메라 앞에 비춰주세요';
  });
});

// ════════════════════════════════════════════════════
//  A-Frame 씬 로드 완료 → 로딩 화면 제거
// ════════════════════════════════════════════════════
document.querySelector('a-scene').addEventListener('loaded', () => {
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.classList.add('hidden');
    setTimeout(() => { loading.style.display = 'none'; }, 800);
  }, 1500);
});

// ════════════════════════════════════════════════════
//  에러 처리: 모델 로드 실패 시 기본 도형으로 대체
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const model = document.getElementById('dino-model');
  model.addEventListener('model-error', () => {
    console.warn('[AR] GLB 모델 로드 실패 → 기본 박스로 대체');
    // 모델 없을 때 색상 박스로 대체 (개발/테스트용)
    model.removeAttribute('gltf-model');
    model.setAttribute('geometry', 'primitive: box; width: 0.3; height: 0.4; depth: 0.3');
    model.setAttribute('material', `color: ${dino.color}; metalness: 0.3; roughness: 0.5`);
    model.setAttribute('animation__float',
      'property: position; from: 0 0 0; to: 0 0.05 0; dir: alternate; loop: true; dur: 1200; easing: easeInOutSine'
    );
  });
});
</script>

</body>
</html>
